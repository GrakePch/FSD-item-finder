name: Update SPV Vehicle Data

on:
  workflow_dispatch:
  schedule:
    - cron: "30 18 * * 0"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-spv-vehicle-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Generate SPV vehicle data
        run: |
          node scripts/vehicle/update_spv_vehicle_data.mjs
          node scripts/uex_item/update_spv_classname_to_uex_id.mjs

      - name: Validate generated data
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm run build

      - name: Commit updated data
        run: |
          if git diff --quiet -- src/data/vehicles/spv_vehicle_list.ts src/data/vehicles/spv_vehicle_index.ts src/data/vehicles/spv_vehicle_hardpoints.ts src/data/vehicles/manual_vehicle_classname_to_series.ts src/data/vehicles/spv_classname_to_uex_id.json src/data/vehicles/spv_vehicle_items_essential.json; then
            echo "No SPV vehicle data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/vehicles/spv_vehicle_list.ts src/data/vehicles/spv_vehicle_index.ts src/data/vehicles/spv_vehicle_hardpoints.ts src/data/vehicles/manual_vehicle_classname_to_series.ts src/data/vehicles/spv_classname_to_uex_id.json src/data/vehicles/spv_vehicle_items_essential.json
          git commit -m "chore(data): update SPV vehicle data"
          git push
