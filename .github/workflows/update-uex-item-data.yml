name: Update UEX Item Data

on:
  workflow_dispatch:
  schedule:
    - cron: "30 18 * * 0"

permissions:
  contents: write

jobs:
  update-uex-item-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate UEX item data
        run: python scripts/uex_item/update_items_uex.json.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate build
        run: |
          npm ci
          npm run build

      - name: Commit updated data
        run: |
          if git diff --quiet -- public/data/items_uex.json; then
            echo "No UEX item data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/items_uex.json
          git commit -m "update UEX item data"
          git push
