name: Update UEX Item Data

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Update I18n Data"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

jobs:
  update-uex-item-data:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Generate UEX key maps
        run: python scripts/uex_item/update_key_to_uex_id.py --output-item "$RUNNER_TEMP/itemkey_id.json" --output-vehicle "$RUNNER_TEMP/vehiclekey_id.json"

      - name: Generate UEX vehicle i18n map
        run: python scripts/uex_item/update_vehicle_key_to_uex_ids_and_i18n.py --vehicle-keys "$RUNNER_TEMP/vehiclekey_id.json"

      - name: Generate UEX item data
        run: python scripts/uex_item/update_items_uex.json.py --item-keys "$RUNNER_TEMP/itemkey_id.json"

      - name: Generate vehicle UEX map
        run: node scripts/uex_item/update_vehicle_classname_to_uex_id.mjs

      - name: Validate generated data
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm run build

      - name: Commit updated data
        run: |
          if git diff --quiet -- src/data/vehicles/key_to_uex_ids_and_i18n.json src/data/vehicles/vehicle_classname_to_uex_id.json public/data/items.json; then
            echo "No UEX item data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/vehicles/key_to_uex_ids_and_i18n.json src/data/vehicles/vehicle_classname_to_uex_id.json public/data/items.json
          git commit -m "chore(data): update UEX item data"
          git push
